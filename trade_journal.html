<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Journal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#e8e8e8;padding:1.5rem;max-width:800px;margin:0 auto}
h1{font-size:22px;font-weight:500;margin-bottom:1.5rem}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.btn-add{display:flex;align-items:center;gap:6px;background:#e8e8e8;color:#0f0f0f;border:none;border-radius:8px;padding:8px 16px;font-size:14px;font-weight:500;cursor:pointer}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:1.5rem}
.stat{background:#1a1a1a;border-radius:8px;padding:1rem;text-align:center}
.stat-label{font-size:12px;color:#888;margin-bottom:4px}
.stat-val{font-size:22px;font-weight:500}
.stat-val.green{color:#1D9E75}
.stat-val.red{color:#E24B4A}
.filters{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.filter-btn{background:transparent;border:1px solid #333;border-radius:8px;padding:5px 12px;font-size:13px;cursor:pointer;color:#888}
.filter-btn.active{background:#e8e8e8;color:#0f0f0f;border-color:#e8e8e8}
.trades{display:flex;flex-direction:column;gap:8px}
.trade-card{background:#1a1a1a;border:1px solid #222;border-radius:12px;padding:1rem 1.25rem;cursor:pointer;transition:border-color 0.15s}
.trade-card:hover{border-color:#444}
.trade-card.win{border-left:3px solid #1D9E75}
.trade-card.loss{border-left:3px solid #E24B4A}
.trade-card.open{border-left:3px solid #378ADD}
.trade-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.badge{font-size:11px;font-weight:500;padding:3px 8px;border-radius:4px}
.badge.long{background:#1a2e1a;color:#1D9E75}
.badge.short{background:#2e1a1a;color:#E24B4A}
.badge.win{background:#1a2e1a;color:#1D9E75}
.badge.loss{background:#2e1a1a;color:#E24B4A}
.badge.open{background:#1a1e2e;color:#378ADD}
.trade-pair{font-weight:500;font-size:15px}
.trade-date{font-size:12px;color:#555;margin-left:auto}
.trade-row{display:flex;gap:16px;font-size:13px;color:#888;flex-wrap:wrap;margin-top:4px}
.rr-val{font-weight:500;color:#e8e8e8}
.trade-note{font-size:13px;color:#666;margin-top:6px;font-style:italic}
.tv-link{font-size:12px;color:#378ADD;text-decoration:none;margin-top:6px;display:inline-block}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem;z-index:10;overflow-y:auto}
.modal{background:#1a1a1a;border-radius:12px;border:1px solid #333;padding:1.5rem;width:100%;max-width:520px}
.modal-title{font-size:18px;font-weight:500;margin-bottom:1.25rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-field.full{grid-column:1/-1}
.form-field label{font-size:12px;color:#888}
.form-field input,.form-field select,.form-field textarea{width:100%;background:#111;border:1px solid #333;border-radius:8px;padding:8px 10px;font-size:14px;color:#e8e8e8;font-family:inherit}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{outline:none;border-color:#555}
.form-field textarea{resize:vertical;min-height:70px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
.btn-cancel{background:transparent;border:1px solid #333;border-radius:8px;padding:8px 16px;font-size:14px;cursor:pointer;color:#888}
.btn-delete{background:transparent;border:1px solid #E24B4A;border-radius:8px;padding:8px 16px;font-size:14px;cursor:pointer;color:#E24B4A}
.btn-save{background:#e8e8e8;color:#0f0f0f;border:none;border-radius:8px;padding:8px 16px;font-size:14px;font-weight:500;cursor:pointer}
.empty{text-align:center;padding:3rem 1rem;color:#555;font-size:14px}
.export-btn{background:transparent;border:1px solid #333;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;color:#888}
</style>
</head>
<body>
<div class="header">
  <h1>Trade Journal</h1>
  <div style="display:flex;gap:8px">
    <button class="export-btn" onclick="exportCSV()">Export CSV</button>
    <button class="btn-add" onclick="openModal()">+ Trade toevoegen</button>
  </div>
</div>
<div class="stats" id="stats"></div>
<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all',this)">Alle</button>
  <button class="filter-btn" onclick="setFilter('long',this)">Long</button>
  <button class="filter-btn" onclick="setFilter('short',this)">Short</button>
  <button class="filter-btn" onclick="setFilter('win',this)">Wins</button>
  <button class="filter-btn" onclick="setFilter('loss',this)">Losses</button>
  <button class="filter-btn" onclick="setFilter('open',this)">Open</button>
</div>
<div class="trades" id="trades"></div>
<div id="modal-slot"></div>

<script>
let trades = JSON.parse(localStorage.getItem('tj_trades') || '[]');
let filter = 'all';
let editId = null;

function save() { localStorage.setItem('tj_trades', JSON.stringify(trades)); }

function renderStats() {
  const closed = trades.filter(t => t.outcome !== 'open');
  const wins = closed.filter(t => t.outcome === 'win');
  const wr = closed.length ? Math.round(wins.length / closed.length * 100) : 0;
  const rrs = closed.map(t => parseFloat(t.rr) || 0);
  const avgRR = rrs.length ? (rrs.reduce((a,b) => a+b, 0) / rrs.length).toFixed(2) : '-';
  const totalR = rrs.reduce((a,b) => a+b, 0).toFixed(1);
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">Trades</div><div class="stat-val">${trades.length}</div></div>
    <div class="stat"><div class="stat-label">Winrate</div><div class="stat-val ${wr>=50?'green':'red'}">${closed.length ? wr+'%' : '-'}</div></div>
    <div class="stat"><div class="stat-label">Gem. RR</div><div class="stat-val">${avgRR}</div></div>
    <div class="stat"><div class="stat-label">Totaal R</div><div class="stat-val ${parseFloat(totalR)>=0?'green':'red'}">${closed.length ? totalR+'R' : '-'}</div></div>
    <div class="stat"><div class="stat-label">Open</div><div class="stat-val">${trades.filter(t=>t.outcome==='open').length}</div></div>
  `;
}

function renderTrades() {
  let list = trades;
  if (filter === 'long') list = trades.filter(t => t.direction === 'long');
  else if (filter === 'short') list = trades.filter(t => t.direction === 'short');
  else if (filter === 'win') list = trades.filter(t => t.outcome === 'win');
  else if (filter === 'loss') list = trades.filter(t => t.outcome === 'loss');
  else if (filter === 'open') list = trades.filter(t => t.outcome === 'open');
  const cont = document.getElementById('trades');
  if (!list.length) { cont.innerHTML = '<div class="empty">Nog geen trades hier. Voeg je eerste trade toe!</div>'; return; }
  cont.innerHTML = list.slice().reverse().map(t => {
    const rr = t.outcome !== 'open' && t.rr ? `<span>RR: <span class="rr-val">${parseFloat(t.rr).toFixed(2)}R</span></span>` : '';
    const link = t.tvlink ? `<a class="tv-link" href="${t.tvlink}" target="_blank">↗ TradingView</a>` : '';
    return `<div class="trade-card ${t.outcome}" onclick="openModal('${t.id}')">
      <div class="trade-top">
        <span class="badge ${t.direction}">${t.direction.toUpperCase()}</span>
        <span class="badge ${t.outcome}">${t.outcome==='win'?'Win':t.outcome==='loss'?'Loss':'Open'}</span>
        <span class="trade-pair">${t.pair||'BTC/USDT'}</span>
        <span class="trade-date">${t.date||''}</span>
      </div>
      <div class="trade-row">
        ${t.entry ? `<span>Entry: ${t.entry}</span>` : ''}
        ${t.sl ? `<span>SL: ${t.sl}</span>` : ''}
        ${t.target ? `<span>Target: ${t.target}</span>` : ''}
        ${t.tf ? `<span>${t.tf}</span>` : ''}
        ${rr}
      </div>
      ${t.setup ? `<div class="trade-note">${t.setup}</div>` : ''}
      ${link}
    </div>`;
  }).join('');
}

function render() { renderStats(); renderTrades(); }

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTrades();
}

function openModal(id) {
  editId = id || null;
  const t = id ? trades.find(x => x.id === id) : {};
  document.getElementById('modal-slot').innerHTML = `
    <div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-title">${id ? 'Trade bewerken' : 'Nieuwe trade'}</div>
      <div class="form-grid">
        <div class="form-field"><label>Pair</label><input id="f-pair" value="${t.pair||'BTC/USDT'}"></div>
        <div class="form-field"><label>Datum</label><input id="f-date" type="date" value="${t.date||new Date().toISOString().slice(0,10)}"></div>
        <div class="form-field"><label>Richting</label><select id="f-dir">
          <option value="long" ${(!t.direction||t.direction==='long')?'selected':''}>Long</option>
          <option value="short" ${t.direction==='short'?'selected':''}>Short</option>
        </select></div>
        <div class="form-field"><label>Timeframe</label><select id="f-tf">
          <option value="1m" ${t.tf==='1m'?'selected':''}>1m</option>
          <option value="5m" ${t.tf==='5m'?'selected':''}>5m</option>
          <option value="15m" ${t.tf==='15m'?'selected':''}>15m</option>
          <option value="1H" ${t.tf==='1H'?'selected':''}>1H</option>
          <option value="4H" ${t.tf==='4H'?'selected':''}>4H</option>
          <option value="1D" ${t.tf==='1D'?'selected':''}>1D</option>
        </select></div>
        <div class="form-field"><label>Entry prijs</label><input id="f-entry" value="${t.entry||''}"></div>
        <div class="form-field"><label>Stop loss</label><input id="f-sl" value="${t.sl||''}"></div>
        <div class="form-field"><label>Target</label><input id="f-target" value="${t.target||''}"></div>
        <div class="form-field"><label>Uitkomst</label><select id="f-out">
          <option value="open" ${(!t.outcome||t.outcome==='open')?'selected':''}>Open</option>
          <option value="win" ${t.outcome==='win'?'selected':''}>Win</option>
          <option value="loss" ${t.outcome==='loss'?'selected':''}>Loss</option>
        </select></div>
        <div class="form-field full"><label>RR behaald (bv. 2.5)</label><input id="f-rr" placeholder="Vul in na sluiten trade" value="${t.rr||''}"></div>
        <div class="form-field full"><label>Setup / uitleg (waarom deze trade?)</label><textarea id="f-setup">${t.setup||''}</textarea></div>
        <div class="form-field full"><label>TradingView link</label><input id="f-tv" placeholder="https://..." value="${t.tvlink||''}"></div>
        <div class="form-field full"><label>Emoties / fouten (eerlijk zijn!)</label><textarea id="f-notes">${t.notes||''}</textarea></div>
      </div>
      <div class="modal-btns">
        ${id ? `<button class="btn-delete" onclick="deleteTrade('${id}')">Verwijderen</button>` : ''}
        <button class="btn-cancel" onclick="closeModal()">Annuleren</button>
        <button class="btn-save" onclick="saveTrade()">Opslaan</button>
      </div>
    </div></div>`;
}

function closeModal() { document.getElementById('modal-slot').innerHTML = ''; }

function saveTrade() {
  const t = {
    id: editId || Date.now().toString(),
    pair: document.getElementById('f-pair').value,
    date: document.getElementById('f-date').value,
    direction: document.getElementById('f-dir').value,
    tf: document.getElementById('f-tf').value,
    entry: document.getElementById('f-entry').value,
    sl: document.getElementById('f-sl').value,
    target: document.getElementById('f-target').value,
    outcome: document.getElementById('f-out').value,
    rr: document.getElementById('f-rr').value,
    setup: document.getElementById('f-setup').value,
    tvlink: document.getElementById('f-tv').value,
    notes: document.getElementById('f-notes').value,
  };
  if (editId) { const i = trades.findIndex(x => x.id === editId); if (i > -1) trades[i] = t; }
  else trades.push(t);
  save(); closeModal(); render();
}

function deleteTrade(id) {
  if (confirm('Trade verwijderen?')) { trades = trades.filter(t => t.id !== id); save(); closeModal(); render(); }
}

function exportCSV() {
  const headers = ['Datum','Pair','Richting','Timeframe','Entry','SL','Target','Uitkomst','RR','Setup','TradingView','Notities'];
  const rows = trades.map(t => [t.date,t.pair,t.direction,t.tf,t.entry,t.sl,t.target,t.outcome,t.rr,`"${(t.setup||'').replace(/"/g,'""')}"`,t.tvlink,`"${(t.notes||'').replace(/"/g,'""')}"`]);
  const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'trades_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

render();
</script>
</body>
</html>
